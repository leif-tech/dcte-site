<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed - DCTE</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Open Sans',sans-serif;background:#f7f8fc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:20px;padding:48px 40px;text-align:center;max-width:480px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
    .check{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#e91e8c,#8b2fc9,#5cb8e6);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:2rem;color:#fff}
    h1{font-family:'Montserrat',sans-serif;font-size:1.6rem;font-weight:800;color:#1a1a3e;margin-bottom:12px}
    p{color:#718096;font-size:0.95rem;line-height:1.65;margin-bottom:24px}
    .btn{display:inline-block;padding:13px 32px;background:linear-gradient(135deg,#e91e8c,#8b2fc9,#5cb8e6);color:#fff;border-radius:8px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.88rem;text-decoration:none;text-transform:uppercase;letter-spacing:0.5px;transition:all .3s}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(139,47,201,0.3)}
    .links{margin-top:20px;font-size:0.85rem}
    .links a{color:#8b2fc9;font-weight:600;text-decoration:none;margin:0 8px}
    .links a:hover{color:#e91e8c}
  </style>
</head>
<body>
  <div class="card">
    <div class="check">&#10003;</div>
    <h1>Order Confirmed!</h1>
    <p>Thank you for your purchase! Your payment has been received. We'll process your order right away. Check your email for the receipt.</p>
    <a href="/" class="btn">Back to DCTE</a>
    <div class="links">
      <a href="https://www.facebook.com/DCTE168" target="_blank">Message us on Facebook</a>
      <span style="color:#cbd5e1">|</span>
      <a href="tel:09956533350">Call Us</a>
    </div>
  </div>
</body>
</html>
